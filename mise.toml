[tools]
jq = "latest"
node = "24"
pnpm = "11"
rust = "1.91"
watchexec = "latest"
yq = "latest"

[tasks.dev]
run = "pnpm tauri dev"
description = "Start Tauri development (Vite dev server + native window)"

[tasks.build]
run = "pnpm tauri build"
description = "Build the native application for production"

[tasks.lint]
run = "pnpm run lint"
description = "Run ESLint type-checked linting"

[tasks.typecheck]
run = "pnpm run typecheck"
description = "Run TypeScript type checking"

[tasks.download-sprites]
run = "bash scripts/download-sprites.sh"
description = "Download original Castle of the Winds sprites from castleofthewinds.com into assets/sprites/"
